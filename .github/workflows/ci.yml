name: CI - VeggieFind Frontend

# Si attiva ad ogni push sul branch main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: veggie-find

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: veggie-find/package-lock.json

      - name: Installa le dipendenze
        run: npm ci

      - name: Esegui il linting
        run: npm run lint

      - name: Build dell'immagine Docker
        env:
          VITE_SPOONACULAR_KEY: ${{ secrets.VITE_SPOONACULAR_KEY }}
        run: docker build --build-arg VITE_SPOONACULAR_KEY="$VITE_SPOONACULAR_KEY" -t veggiefind-frontend:ci .

  deploy:
    needs: lint-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: veggie-find

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: veggie-find/package-lock.json

      - name: Installa le dipendenze
        run: npm ci

      - name: Build di produzione (Vite)
        env:
          VITE_SPOONACULAR_KEY: ${{ secrets.VITE_SPOONACULAR_KEY }}
        run: npm run build

      - name: Deploy su Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=dist --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN"
